# Example Nginx server block for Cyber Comptech Networks (Azure VM).
# Adjust paths, server_name, and ssl_certificate* for your environment.
# HTTP/2 is enabled automatically when "listen ... ssl http2" is used (nginx 1.25+ may use "http2 on").

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.cybercothtechnetworks.co.zw cybercothtechnetworks.co.zw;

    # ssl_certificate     /etc/letsencrypt/live/your-domain/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;

    root /var/www/cctn;
    index index.html;

    # Safer defaults for slow / high-latency clients
    client_body_buffer_size 10k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Compression (gzip). For Brotli, install ngx_brotli and add brotli_* directives.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|mjs|woff2?|webp|avif|png|jpe?g|gif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.cybercothtechnetworks.co.zw cybercothtechnetworks.co.zw;
    return 301 https://$host$request_uri;
}
